{% extends "base.html" %}

{% block title %}Criar conta - AgroLink{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Criar conta</h1>
        <p class="auth-subtitle">Cadastre-se para anunciar seus produtos e falar com veterinários.</p>

        <form method="post" class="form" enctype="multipart/form-data">
            <label class="form-field">
                <span>Nome completo</span>
                <input type="text" name="name" required>
            </label>

            <label class="form-field">
                <span>Foto de perfil (opcional)</span>
                <input type="file" name="profile_image" accept="image/*">
            </label>

            <label class="form-field">
                <span>E-mail</span>
                <input type="email" name="email" required>
            </label>

            <label class="form-field">
                <span>Senha</span>
                <input type="password" name="password" required minlength="4">
            </label>

            <label class="form-field">
                <span>Cidade (opcional)</span>
                <input type="text" name="city">
            </label>

            <label class="form-field">
                <span>Tipo de conta</span>
                <select name="role" required>
                    <option value="">Selecione...</option>
                    <option value="produtor">Produtor</option>
                    <option value="veterinario">Veterinário</option>
                    <option value="usuario">Usuário comum</option>
                </select>
            </label>

            <label class="form-field vet-only" style="display: none;">
                <span>CRMV (somente veterinários)</span>
                <input type="text" name="crmv" autocomplete="off">
            </label>

            <label class="form-field">
                <span>Descrição / Bio (opcional)</span>
                <textarea name="bio" rows="3" placeholder="Conte um pouco sobre você, sua propriedade ou especialidade."></textarea>
            </label>

            <button type="submit" class="btn btn-primary btn-full">Criar conta</button>
        </form>

        <p class="auth-footer">
            Já tem conta?
            <a href="{{ url_for('login') }}">Entrar</a>
        </p>
    </div>
</div>
{% endblock %}
