{% extends "base.html" %}

{% block title %}Entrar - AgroLink{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Entrar</h1>
        <p class="auth-subtitle">Acesse sua conta para continuar.</p>

        <form method="post" class="form">
            <label class="form-field">
                <span>E-mail</span>
                <input type="email" name="email" required>
            </label>

            <label class="form-field">
                <span>Senha</span>
                <input type="password" name="password" required>
            </label>

            <button type="submit" class="btn btn-primary btn-full">Entrar</button>
        </form>

        <p class="auth-footer">
            Ainda não tem conta?
            <a href="{{ url_for('register') }}">Cadastre-se</a>
        </p>
    </div>
</div>
{% endblock %}
