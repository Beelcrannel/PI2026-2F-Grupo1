{% extends "base.html" %}
{% block title %}Criar conta — CONCOOP{% endblock %}

{% block content %}
<div class="auth-wrap" style="padding:2rem 0;">
  <div class="auth-box" style="max-width:520px;">
    <div class="auth-logo-badge">C</div>
    <h1 class="auth-title">Criar conta</h1>
    <p class="auth-sub">Junte-se à rede que conecta o campo.</p>

    <form method="post" class="form-grid" enctype="multipart/form-data">
      <div class="form-row">
        <div class="form-field">
          <label for="name">Nome completo</label>
          <input type="text" id="name" name="name" required placeholder="João Silva">
        </div>
        <div class="form-field">
          <label for="city">Cidade (opcional)</label>
          <input type="text" id="city" name="city" placeholder="Ex: Passos, MG">
        </div>
      </div>

      <div class="form-field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required placeholder="seu@email.com">
      </div>

      <div class="form-field">
        <label for="password">Senha <span style="font-weight:400;text-transform:none;color:var(--muted);">(mín. 4 caracteres)</span></label>
        <input type="password" id="password" name="password" required minlength="4" placeholder="••••••••">
      </div>

      <div class="form-field">
        <label for="role">Tipo de conta</label>
        <select id="role" name="role" required>
          <option value="">Selecione...</option>
          <option value="produtor">Produtor Rural</option>
          <option value="servidor">Prestador de Serviços</option>
          <option value="veterinario">Veterinário</option>
          <option value="usuario">Usuário Comum</option>
        </select>
      </div>

      <div class="form-field" id="crmv-field" style="display:none;">
        <label for="crmv">CRMV</label>
        <input type="text" id="crmv" name="crmv" placeholder="Ex: SP-12345" autocomplete="off">
      </div>

      <div class="form-field">
        <label for="bio">Bio / Descrição (opcional)</label>
        <textarea id="bio" name="bio" rows="3" placeholder="Conte sobre você, sua propriedade ou especialidade..."></textarea>
      </div>

      <div class="form-field">
        <label for="profile_image">Foto de perfil (opcional)</label>
        <input type="file" id="profile_image" name="profile_image" accept="image/*">
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-full">Criar conta grátis</button>
    </form>

    <p class="form-footer-link">
      Já tem conta? <a href="{{ url_for('login') }}">Entrar</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const role = document.getElementById('role');
  const crmvField = document.getElementById('crmv-field');
  role.addEventListener('change', () => {
    crmvField.style.display = role.value === 'veterinario' ? 'flex' : 'none';
  });
</script>
{% endblock %}
