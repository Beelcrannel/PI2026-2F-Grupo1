{% extends "base.html" %}
{% block title %}Entrar — CONCOOP{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo-badge">C</div>
    <h1 class="auth-title">Bem-vindo de volta</h1>
    <p class="auth-sub">Entre na sua conta para continuar.</p>

    <form method="post" class="form-grid">
      <div class="form-field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus>
      </div>
      <div class="form-field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top:0.5rem;">Entrar</button>
    </form>

    <p class="form-footer-link">
      Ainda não tem conta? <a href="{{ url_for('register') }}">Criar conta grátis</a>
    </p>
  </div>
</div>
{% endblock %}
